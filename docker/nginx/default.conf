server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Taille max pour les uploads (ex: fichiers Firebase credentials, exports)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Assets statiques (build Vite) — cache long
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fichiers statiques généraux
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|css|js|pdf)$ {
        expires 6M;
        access_log off;
        try_files $uri =404;
    }

    # Point d'entrée Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Timeouts pour les queues longues (exports PDF, OpenAI, etc.)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
    }
}
