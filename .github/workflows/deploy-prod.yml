name: 🚀 Deploy Production

on:
  workflow_run:
    workflows: ["tests"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 : Build l'image Docker et la push sur GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
# ... (steps keep same)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 : Déployer sur le VPS via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          source: ".deploy/*"
          target: "/opt/docker/mibeko-app"
          strip_components: 1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          envs: REPO_LC
          script: |
            set -e
            APP_DIR="/opt/docker/mibeko-app"
            cd "$APP_DIR"

            # ── Login GHCR ───────────────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            # ── Générer le .env de production ───────────────────────────────
            cat > .env <<EOF
            APP_NAME=Mibeko
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=false
            APP_URL=https://app.mibeko.benaja-bendo.fr
            APP_DOMAIN=app.mibeko.benaja-bendo.fr
            APP_LOCALE=fr
            APP_FALLBACK_LOCALE=fr
            APP_FAKER_LOCALE=fr_FR
            APP_MAINTENANCE_DRIVER=file
            BCRYPT_ROUNDS=12
            LOG_CHANNEL=stderr
            LOG_STACK=single
            LOG_LEVEL=warning
            NIGHTWATCH_TOKEN=${{ secrets.NIGHTWATCH_TOKEN }}
            NIGHTWATCH_REQUEST_SAMPLE_RATE=0.1
            DB_CONNECTION=pgsql
            DB_HOST=postgres
            DB_PORT=5432
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            SESSION_ENCRYPT=false
            SESSION_PATH=/
            SESSION_DOMAIN=.mibeko.benaja-bendo.fr
            CACHE_STORE=database
            QUEUE_CONNECTION=database
            BROADCAST_CONNECTION=reverb
            REVERB_APP_ID=123456
            REVERB_APP_KEY=mibeko_key
            REVERB_APP_SECRET=mibeko_secret
            REVERB_HOST=reverb.mibeko.benaja-bendo.fr
            REVERB_PORT=443
            REVERB_SCHEME=https
            VITE_REVERB_APP_KEY=mibeko_key
            VITE_REVERB_HOST=reverb.mibeko.benaja-bendo.fr
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
            FILESYSTEM_DISK=s3
            AWS_ACCESS_KEY_ID=${{ secrets.MINIO_ACCESS_KEY }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.MINIO_SECRET_KEY }}
            AWS_DEFAULT_REGION=us-east-1
            AWS_BUCKET=mibeko-documents
            AWS_ENDPOINT=http://minio:9000
            AWS_USE_PATH_STYLE_ENDPOINT=true
            RABBITMQ_HOST=rabbitmq-mibeko
            RABBITMQ_PORT=5672
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER || 'guest' }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD || 'guest' }}
            AI_PROVIDER=mistral
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            MAIL_MAILER=${{ secrets.MAIL_MAILER }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
            MAIL_FROM_NAME=Mibeko
            FIREBASE_PROJECT_ID=mibeko-mobile-34c01
            FIREBASE_CREDENTIALS_PATH=storage/app/mibeko-mobile-34c01-firebase-adminsdk-fbsvc-570bc4918b.json
            GITHUB_REPOSITORY=$REPO_LC
            EOF

            # ── Déploiement ─────────────────────
            docker compose pull

            # Extraire le dossier public de l'image pour Nginx
            docker create --name temp-app ghcr.io/$REPO_LC:latest
            mkdir -p ./public
            # On vide le dossier sans le supprimer pour ne pas casser le bind mount Docker de Nginx
            find ./public -mindepth 1 -delete
            # Copier le contenu du dossier public
            docker cp temp-app:/var/www/html/public/. ./public/
            # S'assurer que les permissions sont correctes pour Nginx
            chmod -R 755 ./public
            docker rm temp-app

            docker compose up -d --remove-orphans
            # Redémarrer Nginx pour s'assurer qu'il prend bien en compte les nouveaux fichiers
            docker compose restart nginx

            # ── Post-déploiement ─────────────────
            sleep 5
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan db:seed --class=SystemRequirementsSeeder --force
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache

            docker image prune -f
            echo "✅ Déploiement Mibeko terminé avec succès !"
