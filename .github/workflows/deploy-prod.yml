name: 🚀 Deploy Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 : Build l'image Docker et la push sur GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache GitHub Actions pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 : Déployer sur le VPS via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Lowercase repository name (requis pour GHCR)
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          envs: REPO_LC
          script: |
            set -e

            # ── Répertoire de l'application ──────────────────────────────────
            APP_DIR="/opt/docker/mibeko-app"
            mkdir -p "$APP_DIR/nginx" "$APP_DIR/secrets"
            cd "$APP_DIR"

            # ── Login GHCR ───────────────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            # ── Générer le .env de production ───────────────────────────────
            cat > .env <<EOF
            APP_NAME=Mibeko
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=false
            APP_URL=https://app.mibeko.benaja-bendo.fr
            APP_DOMAIN=app.mibeko.benaja-bendo.fr

            APP_LOCALE=fr
            APP_FALLBACK_LOCALE=fr
            APP_FAKER_LOCALE=fr_FR
            APP_MAINTENANCE_DRIVER=file
            BCRYPT_ROUNDS=12

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_LEVEL=warning

            NIGHTWATCH_TOKEN=${{ secrets.NIGHTWATCH_TOKEN }}
            NIGHTWATCH_REQUEST_SAMPLE_RATE=0.1

            DB_CONNECTION=pgsql
            DB_HOST=postgres
            DB_PORT=5432
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            SESSION_ENCRYPT=false
            SESSION_PATH=/
            SESSION_DOMAIN=.mibeko.benaja-bendo.fr

            CACHE_STORE=database
            QUEUE_CONNECTION=database
            BROADCAST_CONNECTION=log

            FILESYSTEM_DISK=s3
            AWS_ACCESS_KEY_ID=${{ secrets.MINIO_ACCESS_KEY }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.MINIO_SECRET_KEY }}
            AWS_DEFAULT_REGION=us-east-1
            AWS_BUCKET=mibeko
            AWS_ENDPOINT=http://minio:9000
            AWS_USE_PATH_STYLE_ENDPOINT=true

            AI_PROVIDER=mistral
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}

            MAIL_MAILER=${{ secrets.MAIL_MAILER }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
            MAIL_FROM_NAME=Mibeko

            FIREBASE_PROJECT_ID=mibeko-mobile-34c01
            FIREBASE_CREDENTIALS_PATH=storage/app/mibeko-mobile-34c01-firebase-adminsdk-fbsvc-570bc4918b.json

            GITHUB_REPOSITORY=$REPO_LC
            EOF

            # ── Générer la config Nginx ──────────────────────────────────────
            cat > nginx/default.conf <<'NGINX'
            server {
                listen 80;
                server_name _;
                root /var/www/html/public;
                index index.php;
                client_max_body_size 50M;

                location /build/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                    try_files $uri =404;
                }

                location / {
                    try_files $uri $uri/ /index.php?$query_string;
                }

                location ~ \.php$ {
                    fastcgi_pass app:9000;
                    fastcgi_index index.php;
                    include fastcgi_params;
                    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
                    fastcgi_param DOCUMENT_ROOT $realpath_root;
                    fastcgi_read_timeout 300;
                    fastcgi_send_timeout 300;
                }

                location ~ /\.(env|git|htaccess) {
                    deny all;
                }
            }
            NGINX

            # ── Générer le docker-compose.yml ────────────────────────────────
            cat > docker-compose.yml <<EOF
            services:
              app:
                image: ghcr.io/$REPO_LC:latest
                container_name: mibeko-app
                restart: unless-stopped
                env_file: [.env]
                volumes:
                  - mibeko_storage:/var/www/html/storage
                  - $APP_DIR/secrets/firebase-credentials.json:/var/www/html/storage/app/mibeko-mobile-34c01-firebase-adminsdk-fbsvc-570bc4918b.json:ro
                networks: [internal, proxy, db_internal]

              nginx:
                image: nginx:1.27-alpine
                container_name: mibeko-nginx
                restart: unless-stopped
                depends_on: [app]
                volumes:
                  - $APP_DIR/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                  - mibeko_storage:/var/www/html/storage:ro
                networks: [internal, proxy]
                labels:
                  - "traefik.enable=true"
                  - "traefik.docker.network=proxy"
                  - "traefik.http.routers.mibeko.rule=Host(\`app.mibeko.benaja-bendo.fr\`)"
                  - "traefik.http.routers.mibeko.entrypoints=websecure"
                  - "traefik.http.routers.mibeko.tls.certresolver=myresolver"
                  - "traefik.http.services.mibeko.loadbalancer.server.port=80"

              queue:
                image: ghcr.io/$REPO_LC:latest
                container_name: mibeko-queue
                restart: unless-stopped
                command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
                env_file: [.env]
                volumes:
                  - mibeko_storage:/var/www/html/storage
                networks: [internal, proxy, db_internal]
                depends_on: [app]

              scheduler:
                image: ghcr.io/$REPO_LC:latest
                container_name: mibeko-scheduler
                restart: unless-stopped
                command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
                env_file: [.env]
                volumes:
                  - mibeko_storage:/var/www/html/storage
                networks: [internal, proxy, db_internal]
                depends_on: [app]

            volumes:
              mibeko_storage:
                driver: local

            networks:
              proxy:
                external: true
              db_internal:
                external: true
              internal:
                driver: bridge
            EOF

            # ── Pull de la nouvelle image et redémarrage ─────────────────────
            docker compose pull
            docker compose up -d --remove-orphans

            # ── Post-déploiement Laravel ─────────────────────────────────────
            # Attendre que PHP-FPM soit prêt
            sleep 5

            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache

            # ── Nettoyage des images obsolètes ───────────────────────────────
            docker image prune -f

            echo "✅ Déploiement Mibeko terminé avec succès !"
