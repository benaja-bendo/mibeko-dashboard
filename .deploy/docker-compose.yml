services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: mibeko-app
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - mibeko_storage:/var/www/html/storage
      - /opt/docker/mibeko-app/secrets/firebase-credentials.json:/var/www/html/storage/app/mibeko-mobile-34c01-firebase-adminsdk-fbsvc-570bc4918b.json:ro
    networks: [internal, proxy, db_internal]

  nginx:
    image: nginx:1.27-alpine
    container_name: mibeko-nginx
    restart: unless-stopped
    depends_on: [app]
    volumes:
      - /opt/docker/mibeko-app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/docker/mibeko-app/public:/var/www/html/public:ro
      - mibeko_storage:/var/www/html/storage:ro
    networks: [internal, proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.mibeko.rule=Host(`app.mibeko.benaja-bendo.fr`)"
      - "traefik.http.routers.mibeko.entrypoints=websecure"
      - "traefik.http.routers.mibeko.tls.certresolver=myresolver"
      - "traefik.http.services.mibeko.loadbalancer.server.port=80"

  queue:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: mibeko-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file: [.env]
    volumes:
      - mibeko_storage:/var/www/html/storage
    networks: [internal, proxy, db_internal]
    depends_on: [app]

  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: mibeko-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: [.env]
    volumes:
      - mibeko_storage:/var/www/html/storage
    networks: [internal, proxy, db_internal]
    depends_on: [app]

volumes:
  mibeko_storage:
    driver: local

networks:
  proxy:
    external: true
  db_internal:
    external: true
  internal:
    driver: bridge
